name: Sync Skills
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate SKILL.md structure
        run: |
          errors=0
          while IFS= read -r f; do
            name=$(basename "$(dirname "$f")")
            if ! head -1 "$f" | grep -q "^---$"; then
              echo "Missing frontmatter: $name/SKILL.md"
              errors=$((errors+1))
            fi
          done < <(find . -name SKILL.md -not -path './.github/*')
          exit $errors

  generate-catalog:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate CATALOG.md
        run: |
          python3 << 'PYEOF'
          import yaml
          from pathlib import Path
          skills = {}
          for skill_md in sorted(Path('.').rglob('SKILL.md')):
              parts = skill_md.relative_to('.').parts
              if any(p.startswith('.') or p == '.venv' for p in parts): continue
              if 'node_modules' in parts: continue
              try:
                  text = skill_md.read_text(encoding='utf-8')
                  meta = {}
                  if text.startswith('---'):
                      ps = text.split('---', 2)
                      if len(ps) >= 3: meta = yaml.safe_load(ps[1]) or {}
                  cat = meta.get('category', skill_md.parent.parent.name)
                  skills.setdefault(cat, []).append({
                      'name': meta.get('name', skill_md.parent.name),
                      'description': meta.get('description', ''),
                  })
              except: pass
          lines = ['# Skills-Katalog\n', f'Total: {sum(len(v) for v in skills.values())} Skills\n']
          for cat in sorted(skills):
              items = skills[cat]
              lines.append(f'\n## {cat} ({len(items)})\n')
              for s in items:
                  lines.append(f'- **{s["name"]}** — {s["description"] or ""}')
          Path('CATALOG.md').write_text('\n'.join(lines), encoding='utf-8')
          print(f'Generated CATALOG.md: {sum(len(v) for v in skills.values())} skills')
          PYEOF
      - name: Commit CATALOG.md
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CATALOG.md
          git diff --staged --quiet || git commit -m "Auto: Update CATALOG.md [skip ci]"
          git push
